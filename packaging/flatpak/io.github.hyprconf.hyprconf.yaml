# Flatpak manifest for hyprconf (optional / experimental).
#
# Flatpak Rust builds are OFFLINE, so first vendor the crate sources with
# flatpak-cargo-generator (https://github.com/flatpak/flatpak-builder-tools):
#
#   python3 flatpak-cargo-generator.py ../../Cargo.lock -o cargo-sources.json
#
# then, from this directory:
#
#   flatpak-builder --user --install --force-clean build \
#     io.github.hyprconf.hyprconf.yaml
#
# Note: inside the sandbox there is no host `hyprctl`, so live-apply/reload
# degrade off (the rest of the app works). Editing your config requires the
# xdg-config/hypr filesystem permission below.
app-id: io.github.hyprconf.hyprconf
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: hyprconf
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-config/hypr:rw
modules:
  - name: hyprconf
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/hyprconf/cargo
    build-commands:
      - cargo --offline build --release -p hyprconf-gui
      - install -Dm0755 target/release/hyprconf /app/bin/hyprconf
      - install -Dm0644 packaging/hyprconf.desktop
        /app/share/applications/io.github.hyprconf.hyprconf.desktop
      - install -Dm0644 LICENSE-MIT /app/share/licenses/hyprconf/LICENSE-MIT
      - install -Dm0644 LICENSE-APACHE /app/share/licenses/hyprconf/LICENSE-APACHE
    sources:
      - type: dir
        path: ../..
      # Generated by flatpak-cargo-generator (see header); provides offline crates.
      - cargo-sources.json
