name: Release

on:
  push:
    tags: ['v*']

# Needed to create the GitHub Release and upload assets.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build & attach (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p hyprconf-gui --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          ver="${GITHUB_REF_NAME#v}"
          dist="hyprconf-${ver}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/hyprconf" "$dist/"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE NOTICE "$dist/"
          cp packaging/hyprconf.desktop "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"
          sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hyprconf-*.tar.gz
            hyprconf-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
