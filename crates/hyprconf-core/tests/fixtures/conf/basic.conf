# hyprconf test fixture: a representative hyprland.conf
# -----------------------------------------------------

$mainMod = SUPER          # main modifier

monitor = , preferred, auto, 1

# General look & feel
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    layout = dwindle
}

decoration {
    rounding = 5            # rounded corners
    active_opacity = 1.0

    blur {
        enabled = true
        size = 8
    }
}

# A custom, non-schema key must be preserved and warned about
general:made_up_option = 123

input {
    kb_layout = us
    follow_mouse = 1
}

# Autostart
exec-once = waybar
env = XCURSOR_SIZE, 24

# Keybinds
bind = $mainMod, Q, killactive
bindm = $mainMod, mouse:272, movewindow
bind = $mainMod, F, fullscreen, 1

# A modal submap
submap = resize
binde = , right, resizeactive, 10 0
bind = , escape, submap, reset
submap = reset

# Window rules
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = opacity 0.9 0.9, class:^(kitty)$
